    :root{

      --dark-line:rgba(255,255,255,.09);--ok:#16a34a;--warn:#d97706;--bad:#dc2626;

    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 500px at 50% -10%, rgba(25,84,190,.24), transparent 55%),
        radial-gradient(900px 600px at 0% 0%, rgba(20,72,160,.16), transparent 55%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 44%, #04101d 100%);

    .page{max-width:1140px;margin:0 auto;padding:26px 24px 56px}
    .langbar{display:flex;justify-content:flex-end;gap:8px;margin:0 0 18px}

    .langbtn.active{background:#fff;color:var(--ink);border-color:#fff}
    .rail{margin:0 0 18px}

    .rail-item{padding:18px 18px 17px;border-right:1px solid var(--line)}

    .rail-title{margin:0;font-size:clamp(20px,2vw,28px);line-height:1.02;letter-spacing:-.04em;color:var(--ink);font-weight:880}

    .hero-title{margin:0;font-size:clamp(38px,5vw,58px);line-height:.98;letter-spacing:-.06em;color:var(--ink);font-weight:900}
    .hero-side{flex:0 0 auto;display:flex;align-items:center;min-height:38px;padding:0 14px;border-radius:999px;background:#0f172a;color:#fff;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;white-space:nowrap}
    .hero-intro{margin:0 0 18px;max-width:900px;color:var(--muted);font-size:15px;line-height:1.62}
    .hero-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:0 0 14px}
    .chip{display:flex;align-items:center;min-height:46px;padding:0 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.84);color:var(--ink);font-size:13px;line-height:1.2;font-weight:760;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-shadow:0 6px 16px rgba(15,23,42,.03)}
    .chip.strong{background:#0f172a;color:#fff;border-color:#0f172a;box-shadow:none}
    .chip.primary{background:#fff;border-color:rgba(15,23,42,.10)}
    .trust-chain{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px}
    .trust-card{border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:18px;padding:16px 16px 14px}
    .trust-kicker{margin:0 0 8px;font-size:11px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:800}
    .trust-copy{margin:0;color:#334155;font-size:14px;line-height:1.62}
    .tool-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
    .tool-pill{display:inline-flex;align-items:center;min-height:32px;padding:0 11px;border-radius:999px;border:1px solid rgba(15,23,42,.06);background:rgba(255,255,255,.48);color:var(--muted2);font-size:11.5px;font-weight:640;text-decoration:none;opacity:.80}
    .statement{border:1px solid var(--line);background:rgba(255,255,255,.74);border-radius:18px;padding:16px 16px 14px}
    .statement-kicker{margin:0 0 8px;font-size:11px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:800}
    .statement-copy{margin:0;font-size:14px;line-height:1.65;color:#334155}
    .section{background:linear-gradient(180deg, rgba(255,255,255,.065) 0%, rgba(255,255,255,.045) 100%);border:1px solid rgba(255,255,255,.11);border-radius:24px;padding:22px 20px;margin:0 0 18px;box-shadow:0 14px 32px rgba(0,0,0,.16)}

    .section-kicker{margin:0 0 8px;font-size:12px;line-height:1.1;letter-spacing:.12em;text-transform:uppercase;color:rgba(232,238,252,.45);font-weight:800}
    .section-title{margin:0 0 8px;font-size:30px;line-height:1.08;letter-spacing:-.03em;color:#edf3ff;font-weight:860}
    .section-intro{margin:0;color:rgba(232,238,252,.74);line-height:1.65;max-width:880px}
    .card-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:18px}
    .subcard{background:rgba(255,255,255,.90);border:1px solid rgba(15,23,42,.08);border-radius:18px;padding:18px;box-shadow:0 10px 22px rgba(15,23,42,.04);color:var(--ink)}
    .subcard h3{margin:0 0 10px;font-size:18px;line-height:1.25;color:var(--ink)}
    .subcard p{margin:0 0 10px;color:var(--muted);line-height:1.58}
    .subcard p:last-child{margin-bottom:0}
    .workspace-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
    .workspace-card{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);border-radius:20px;padding:18px}
    .workspace-label{margin:0 0 8px;font-size:11px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:rgba(232,238,252,.46);font-weight:800}
    .workspace-title{margin:0 0 8px;font-size:20px;line-height:1.15;color:#f4f8ff;font-weight:850}
    .workspace-copy{margin:0 0 14px;color:rgba(232,238,252,.74);line-height:1.62}
    .drop{border:2px dashed rgba(255,255,255,.16);border-radius:18px;padding:20px;text-align:center;color:#e8eefc;background:rgba(0,0,0,.10);min-height:160px;display:flex;flex-direction:column;justify-content:center}
    .drop-title{font-size:17px;font-weight:900;margin-bottom:8px}
    .file-trigger{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 14px;border-radius:12px;border:1px solid rgba(255,255,255,.16);color:#e8eefc;text-decoration:none;font-weight:800;background:rgba(255,255,255,.06);cursor:pointer;margin-top:12px;align-self:center}
    input[type="file"]{display:none}
    input[type="text"]{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);color:#e8eefc;border-radius:12px;margin-top:8px}
    .result-box{margin-top:18px;padding:16px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10)}
    .details-box{margin-top:14px}
    .muted{color:rgba(232,238,252,.72)} .ok{color:var(--ok);font-weight:900} .bad{color:var(--bad);font-weight:900} .warn{color:var(--warn);font-weight:900}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.24);padding:12px;border-radius:12px;color:#e8eefc}
    @media (max-width:980px){.rail-shell,.card-grid,.workspace-grid,.trust-chain,.hero-meta{grid-template-columns:1fr}.rail-item{border-right:none;border-bottom:1px solid var(--line)} .rail-item:last-child{border-bottom:none}}

<script id="HO_VERIFIER_CONTEXT_FOCUS_JS">
(function(){
  function esc(s){
    return String(s || "").replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  function textOf(el){
    return (el && el.textContent || "").replace(/\s+/g, " ").trim();
  }

  function findSmallestBlockContaining(words){
    var nodes = Array.prototype.slice.call(document.querySelectorAll("section, main > div, .card, .panel, .container > div, body > div"));
    var best = null;
    nodes.forEach(function(el){
      var t = textOf(el);
      var ok = words.every(function(w){ return t.indexOf(w) !== -1; });
      if(ok){
        if(!best || textOf(el).length < textOf(best).length) best = el;
      }
    });
    return best;
  }

  function init(){
    var params = new URLSearchParams(window.location.search);
    var project = params.get("project") || "";
    var expectedDocument = params.get("expected_document") || params.get("expected_file") || "";
    var expectedProof = params.get("expected_proof") || "";

    if(!project && !expectedDocument && !expectedProof) return;
    if(document.querySelector(".ho-context-focus")) return;

    document.body.classList.add("ho-context-mode");

    var box = document.createElement("section");
    box.className = "ho-context-focus";
    box.innerHTML =
      '<div class="ho-context-focus-head">' +
        '<div class="ho-context-kicker">HumanOrigin · Vérification guidée</div>' +
        '<h1 class="ho-context-title">Vérifier ce package HumanOrigin</h1>' +
        '<p class="ho-context-sub">Déposez la preuve signée et le document attendu pour confirmer que ce fichier correspond bien à la preuve HumanOrigin.</p>' +
        '<div class="ho-context-grid">' +
          '<div class="ho-context-item"><span>Projet</span><strong>' + esc(project || "Non précisé") + '</strong></div>' +
          '<div class="ho-context-item"><span>Document attendu</span><strong>' + esc(expectedDocument || "Document lié par empreinte SHA-256") + '</strong></div>' +
          '<div class="ho-context-item"><span>Preuve attendue</span><strong>' + esc(expectedProof || "Fichier .ho.json") + '</strong></div>' +
        '</div>' +
      '</div>' +
      '<div class="ho-context-action">' +
        '<div class="ho-context-action-title">Déposer les fichiers</div>' +
        '<div id="ho-context-verification-slot"></div>' +
        '<div class="ho-context-note">La vérification repose sur l’empreinte cryptographique du contenu. Le fichier peut avoir été renommé : ce qui compte est que son contenu corresponde à l’empreinte enregistrée dans la preuve.</div>' +
      '</div>';

    var root = document.querySelector("main") || document.querySelector(".container") || document.body;
    root.insertBefore(box, root.firstChild);

    var verification =
      findSmallestBlockContaining(["Vérifier une preuve", "Importer la preuve"]) ||
      findSmallestBlockContaining(["Importer la preuve", "Importer le document lié"]) ||
      findSmallestBlockContaining(["Choisir le fichier de preuve", "Choisir le document"]);

    var slot = document.getElementById("ho-context-verification-slot");

    if(verification && slot && !verification.contains(box)){
      verification.classList.add("ho-context-moved");
      slot.appendChild(verification);
    }

    Array.prototype.slice.call(document.querySelectorAll("section, main > div, .card, .panel")).forEach(function(el){
      var t = textOf(el);
      if(
        t.indexOf("Preuve disponible") !== -1 ||
        t.indexOf("Ce que ce record signifie") !== -1 ||
        t.indexOf("Comment lire ce record") !== -1 ||
        t.indexOf("Chaîne de confiance") !== -1 ||
        t.indexOf("Déclaration officielle") !== -1
      ){
        el.classList.add("ho-secondary-soft");
      }
    });
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<script id="HO_PROOF_WORKSPACE_PREMIUM_JS_V4">
(function(){
  function hasContext(){
    try{
      var p = new URLSearchParams(window.location.search || "");
      return !!(p.get("project") || p.get("expected_document") || p.get("expected_file") || p.get("expected_proof"));
    }catch(e){
      return false;
    }
  }

  function textOf(el){
    return (el && el.textContent || "").replace(/\s+/g, " ").trim();
  }

  function smallestAncestorContaining(el, requiredTexts, stopTexts){
    var node = el;
    var best = null;

    for(var i=0;i<12 && node && node.parentElement && node !== document.body;i++){
      var t = textOf(node);
      var ok = requiredTexts.every(function(s){ return t.indexOf(s) >= 0; });
      var blocked = (stopTexts || []).some(function(s){ return t.indexOf(s) >= 0; });

      if(ok && !blocked) best = node;
      node = node.parentElement;
    }

    return best;
  }

  function hideGenericStatus(){
    if(!hasContext()) return;

    Array.from(document.querySelectorAll("h1,h2,h3,div,section")).forEach(function(el){
      var t = textOf(el);
      if(
        t.indexOf("Statut de la preuve") >= 0 ||
        t.indexOf("Proof status") >= 0 ||
        t.indexOf("Mode : vue générique") >= 0 ||
        t.indexOf("Mode: Generic view") >= 0
      ){
        if(el.closest("#contextualVerifyHost")) return;

        var node = el;
        for(var i=0;i<8 && node && node.parentElement && node.parentElement !== document.body;i++){
          var nt = textOf(node);
          if(
            nt.indexOf("Mode : vue générique") >= 0 ||
            nt.indexOf("Mode: Generic view") >= 0 ||
            nt.indexOf("Statut actuel de la page") >= 0 ||
            nt.indexOf("Current page status") >= 0
          ){
            node.classList.add("ho-contextual-generic-status-hidden");
            return;
          }
          node = node.parentElement;
        }
      }
    });
  }

  function markProofWorkspace(){
    if(!hasContext()) return;
    document.body.classList.add("ho-context-mode");

    var heading = Array.from(document.querySelectorAll("h1,h2,h3,div")).find(function(el){
      var t = textOf(el);
      return t === "Vérifier une preuve" || t === "Verify a proof record" || t === "Verify a proof";
    });

    if(!heading) return;

    var workspace = smallestAncestorContaining(
      heading,
      ["Importer la preuve", "Importer le document"],
      ["Registre public", "Preuve signée", "Document lié par SHA-256"]
    );

    if(!workspace){
      workspace = smallestAncestorContaining(
        heading,
        ["Upload proof", "Upload linked document"],
        ["Public record", "Signed proof", "SHA-256"]
      );
    }

    if(!workspace) return;

    workspace.classList.add("ho-proof-workspace");

    // Cards
    Array.from(workspace.querySelectorAll("div,section,article")).forEach(function(el){
      var t = textOf(el);
      var isProofCard =
        t.indexOf("Importer la preuve") >= 0 &&
        t.indexOf("Importer le document lié") < 0 &&
        t.indexOf("Clé publique") < 0;

      var isDocCard =
        t.indexOf("Importer le document lié") >= 0 &&
        t.indexOf("Importer la preuve") < 0 &&
        t.indexOf("Clé publique") < 0;

      if(isProofCard || isDocCard){
        var childText = Array.from(el.children || []).map(textOf).join(" ");
        if(childText.length > 20){
          el.classList.add("ho-upload-card");
        }
      }
    });

    // Si les deux cards ne sont pas correctement trouvées, marquer les deux plus grands blocs contenant chaque titre
    ["Importer la preuve", "Importer le document lié"].forEach(function(label){
      var el = Array.from(workspace.querySelectorAll("div,section,article")).find(function(x){
        var t = textOf(x);
        return t.indexOf(label) >= 0 && t.length < 900;
      });
      if(el) el.classList.add("ho-upload-card");
    });

    // Drop targets
    Array.from(workspace.querySelectorAll("div,label,section")).forEach(function(el){
      var t = textOf(el);
      if(
        t.indexOf("Déposez ici un fichier") >= 0 ||
        t.indexOf("Glissez-déposez") >= 0 ||
        t.indexOf("Drop") >= 0 ||
        t.indexOf("Choose proof") >= 0 ||
        t.indexOf("Choisir le fichier") >= 0 ||
        t.indexOf("Choisir le document") >= 0
      ){
        if(t.length < 520){
          el.classList.add("ho-drop-target");
        }
      }
    });

    // Public key zone
    Array.from(workspace.querySelectorAll("div,section")).forEach(function(el){
      var t = textOf(el);
      if(t.indexOf("CLÉ PUBLIQUE DE REMPLACEMENT") >= 0 || t.indexOf("Override public key") >= 0){
        if(t.length < 420){
          el.classList.add("ho-public-key-zone");
        }
      }
    });

    // Warning
    Array.from(document.querySelectorAll("div,p,section")).forEach(function(el){
      var t = textOf(el);
      if(t.indexOf("La vérification repose sur l’empreinte cryptographique") >= 0 || t.indexOf("cryptographic fingerprint") >= 0){
        if(t.length < 420){
          el.classList.add("ho-proof-warning");
        }
      }
    });
  }

  function run(){
    hideGenericStatus();
    markProofWorkspace();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  [50,150,400,900,1600,2500].forEach(function(ms){ setTimeout(run, ms); });

  try{
    var mo = new MutationObserver(run);
    mo.observe(document.documentElement, {childList:true, subtree:true, characterData:true});
  }catch(e){}
})();
</script>

   masque uniquement le panneau pré-import "Statut de la preuve".

<script id="HO_FORCE_HIDE_STATUS_PANEL_V2">
(function () {
  function norm(s) {
    return String(s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function hideStatusPanel() {
    var headings = Array.from(document.querySelectorAll("h1, h2, h3, [role='heading']"));

    var title = headings.find(function (el) {
      var t = norm(el.textContent);
      return t === "statut de la preuve" || t === "proof status";
    });

    if (!title) return;

    var current = title.parentElement;
    var best = null;

    for (var i = 0; i < 10 && current && current !== document.body; i++) {
      var t = norm(current.textContent);

      var containsStatusTitle =
        t.indexOf("statut de la preuve") !== -1 ||
        t.indexOf("proof status") !== -1;

      var containsStatusPanelMarkers =
        t.indexOf("chaine de confiance") !== -1 ||
        t.indexOf("chain of trust") !== -1 ||
        t.indexOf("note de statut") !== -1 ||
        t.indexOf("status note") !== -1 ||
        t.indexOf("aucun record") !== -1 ||
        t.indexOf("no record") !== -1 ||
        t.indexOf("mode : vue generique") !== -1 ||
        t.indexOf("generic view") !== -1;

      var containsUploadWorkspace =
        t.indexOf("verifier une preuve") !== -1 ||
        t.indexOf("verify a proof") !== -1 ||
        t.indexOf("importer la preuve") !== -1 ||
        t.indexOf("import proof") !== -1;

      if (containsStatusTitle && containsStatusPanelMarkers && !containsUploadWorkspace) {
        best = current;
      }

      current = current.parentElement;
    }

    if (!best) {
      // Fallback : masquer le plus petit grand bloc autour du titre
      current = title.parentElement;
      for (var j = 0; j < 8 && current && current !== document.body; j++) {
        var box = current.getBoundingClientRect ? current.getBoundingClientRect() : { width: 0, height: 0 };
        var tx = norm(current.textContent);
        if (
          tx.indexOf("statut de la preuve") !== -1 &&
          box.width > 500 &&
          box.height > 180 &&
          tx.indexOf("verifier une preuve") === -1
        ) {
          best = current;
          break;
        }
        current = current.parentElement;
      }
    }

    if (best) {
      best.classList.add("ho-force-hide-status-panel");
      best.setAttribute("data-ho-hidden", "generic-proof-status");
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", hideStatusPanel);
  } else {
    hideStatusPanel();
  }

  setTimeout(hideStatusPanel, 100);
  setTimeout(hideStatusPanel, 400);
  setTimeout(hideStatusPanel, 1000);

  new MutationObserver(hideStatusPanel).observe(document.documentElement, {
    childList: true,
    subtree: true
  });
})();
</script>
