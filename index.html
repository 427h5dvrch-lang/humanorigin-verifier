    async function handleHoText(text){try{lastHo=await verifyHoJson(text);updateContextFromProofDoc(lastHo.doc);renderVerification()}catch(e){contextualProofState={found:"",verdict:"unknown"};renderContextualVerify();const resultEl=$("result"),detailsEl=$("details");if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div style="font-size:18px;font-weight:950;">${COPY[currentLang].error}: <span class="bad">${escapeHtml(e.message||String(e))}</span></div>`}if(detailsEl){detailsEl.style.display="none";detailsEl.innerHTML=""}}}

    function showStatus(msg){const el=$("result");if(!el)return;el.style.display="block";el.innerHTML=`<div class="muted">${escapeHtml(msg)}</div>`;try{el.scrollIntoView({behavior:"smooth",block:"nearest"})}catch{}}
    function withTimeout(promise,ms,label){let id;const t=new Promise((_,reject)=>{id=setTimeout(()=>reject(new Error(`${label} : délai dépassé (${ms/1000}s). Essayez d'importer la preuve séparément.`)),ms)});return Promise.race([promise,t]).finally(()=>clearTimeout(id))}
    function showHumanError(err){const isFr=currentLang==="fr";const el=$("result");if(!el)return;el.style.display="block";const msg=isFr?"La lecture automatique du kit a échoué. Vous pouvez ouvrir le ZIP et importer la preuve HumanOrigin séparément.":"Automatic kit reading failed. You can open the ZIP and import the HumanOrigin proof separately.";el.innerHTML=`<div style="font-size:15px;font-weight:800;color:rgba(232,238,252,.80);">${msg}</div><div class="muted" style="margin-top:8px;font-size:11px;">${escapeHtml(err?.message||String(err))}</div>`}
    async function extractZipProof(ab){const view=new DataView(ab),bytes=new Uint8Array(ab),dec=new TextDecoder();let eocd=-1;for(let i=bytes.length-22;i>=0;i--){if(view.getUint32(i,true)===0x06054b50){eocd=i;break}}if(eocd<0)throw new Error("Kit ZIP invalide : structure introuvable.");const cdCount=view.getUint16(eocd+8,true),cdOff=view.getUint32(eocd+16,true);const entries=[];let pos=cdOff;for(let i=0;i<cdCount;i++){if(view.getUint32(pos,true)!==0x02014b50)break;const method=view.getUint16(pos+10,true),compSize=view.getUint32(pos+20,true),nameLen=view.getUint16(pos+28,true),extraLen=view.getUint16(pos+30,true),commentLen=view.getUint16(pos+32,true),localOff=view.getUint32(pos+42,true),name=dec.decode(bytes.subarray(pos+46,pos+46+nameLen));if(!name.endsWith("/"))entries.push({name,method,compSize,localOff});pos+=46+nameLen+extraLen+commentLen}async function readEntry(e){const lh=e.localOff;if(view.getUint32(lh,true)!==0x04034b50)throw new Error("Entrée ZIP invalide.");const nl=view.getUint16(lh+26,true),el=view.getUint16(lh+28,true),dataOff=lh+30+nl+el,comp=bytes.subarray(dataOff,dataOff+e.compSize);if(e.method===0)return comp;if(e.method!==8)throw new Error("Compression non supportée : "+e.name);if(typeof DecompressionStream==="undefined")throw new Error("Ce navigateur ne peut pas lire le ZIP automatiquement. Ouvrez le ZIP et importez la preuve séparément.");const ds=new DecompressionStream("deflate-raw"),writer=ds.writable.getWriter(),chunk=comp.slice?comp.slice():new Uint8Array(comp);const outputPromise=withTimeout(new Response(ds.readable).arrayBuffer(),10000,"Décompression ZIP");await withTimeout((async()=>{await writer.write(chunk);await writer.close()})(),10000,"Écriture flux ZIP");return new Uint8Array(await outputPromise)}const proofEntry=entries.find(e=>e.name.split("/").pop()==="HumanOrigin_PROOF.v1.ho.json")||entries.find(e=>/\.ho\.json$/i.test(e.name))||entries.find(e=>/\.json$/i.test(e.name)&&/HumanOrigin/i.test(e.name));if(!proofEntry)throw new Error("Aucun fichier de preuve HumanOrigin trouvé dans ce kit.");const pdfs=entries.filter(e=>/\.pdf$/i.test(e.name)),pdfEntry=pdfs.find(e=>/HumanOrigin/i.test(e.name))||pdfs[0]||null;const proofBytes=await readEntry(proofEntry),proofText=dec.decode(proofBytes);let pdfBytes=null,pdfName=null;if(pdfEntry){pdfBytes=await readEntry(pdfEntry);pdfName=pdfEntry.name.split("/").pop()||pdfEntry.name}const warnings=[];if(!pdfEntry)warnings.push("Aucun PDF dans le kit — vérification de la preuve seule.");if(pdfs.length>1)warnings.push(pdfs.length+" PDF trouvés — premier document HumanOrigin utilisé.");return{proofText,pdfBytes,pdfName,warnings}}
    async function handleZipFile(file){const isFr=currentLang==="fr";try{showStatus(isFr?"Kit HumanOrigin reçu. Lecture du ZIP…":"HumanOrigin kit received. Reading ZIP…");const ab=await withTimeout(file.arrayBuffer(),8000,isFr?"Lecture du fichier ZIP":"ZIP file read");showStatus(isFr?"Extraction de la preuve…":"Extracting proof…");const{proofText,pdfBytes,pdfName,warnings}=await withTimeout(extractZipProof(ab),20000,isFr?"Extraction du kit HumanOrigin":"HumanOrigin kit extraction");showStatus(isFr?"Preuve trouvée. Vérification de la signature…":"Proof found. Verifying signature…");await withTimeout(handleHoText(proofText),10000,isFr?"Vérification de la preuve":"Proof verification");if(pdfBytes){showStatus(isFr?"PDF trouvé. Vérification du lien…":"PDF found. Verifying link…");await withTimeout(handleDocFile(new File([pdfBytes],pdfName||"document.pdf",{type:"application/pdf"})),10000,isFr?"Vérification PDF":"PDF verification")}if(warnings.length){const el=$("result");if(el){const w=document.createElement("div");w.className="muted";w.style.cssText="margin-top:10px;font-size:12px;";w.textContent=warnings.join(" ");el.appendChild(w)}}}catch(err){showHumanError(err)}}
    async function handlePdfOnly(file){const digestBytes=await sha256BytesFromFile(file);lastDocHex=u8ToHex(digestBytes);if(lastHo){renderVerification()}else{const resultEl=$("result");if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div class="hint-box">${escapeHtml(COPY[currentLang].pdfHint)}</div>`}}}
    async function sniffHumanOriginFile(file){const name=String(file?.name||""),type=String(file?.type||"").toLowerCase();if(/\.zip$/i.test(name)||type==="application/zip"||type==="application/x-zip-compressed")return"zip";if(/\.pdf$/i.test(name)||type==="application/pdf")return"pdf";if(/\.ho\.json$/i.test(name)||/\.json$/i.test(name)||type==="application/json")return"json";const head=new Uint8Array(await file.slice(0,16).arrayBuffer());if(head.length>=2&&head[0]===0x50&&head[1]===0x4b)return"zip";if(head.length>=4&&head[0]===0x25&&head[1]===0x50&&head[2]===0x44&&head[3]===0x46)return"pdf";const sample=new TextDecoder().decode(head).trim();if(sample.startsWith("{")||sample.startsWith("["))return"json";return"unknown"}
    async function handleAnyFile(file){if(!file)return;const resultEl=$("result");if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div class="muted">${COPY[currentLang].receiving||COPY[currentLang].loading}</div>`}try{const kind=await sniffHumanOriginFile(file);if(kind==="zip"){await handleZipFile(file);return}if(kind==="json"){await handleHoText(await file.text());return}if(kind==="pdf"){await handlePdfOnly(file);return}const isFr=currentLang==="fr";const fmt=(n,t,s)=>{const sz=s>0?(s>1048576?(s/1048576).toFixed(1)+" MB":s>1024?(s/1024).toFixed(1)+" KB":s+" B"):"—";return`${escapeHtml(n||"—")} · ${escapeHtml(t||"—")} · ${sz}`};if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div style="font-size:15px;font-weight:800;color:rgba(232,238,252,.80);">${escapeHtml(COPY[currentLang].unknownFile)}</div><div class="muted" style="margin-top:8px;font-size:11px;">${isFr?"Fichier reçu":"Received file"} : ${fmt(file.name,file.type,file.size||0)}</div>`}}catch(err){if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div style="font-size:18px;font-weight:950;">${COPY[currentLang].error} : <span class="bad">${escapeHtml(err?.message||String(err))}</span></div>`}}}

    function wireAll(){

      if(fileDoc&&!fileDoc.dataset.wired){fileDoc.dataset.wired="1";fileDoc.addEventListener("change",async e=>{const f=e.target.files?.[0];if(!f)return;handleDocFile(f)})}
