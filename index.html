      if(lastDocHex&&expectedDocSha){const expected=String(expectedDocSha||"").toLowerCase(),got=String(lastDocHex||"").toLowerCase(),match=expected&&got&&expected===got;docCheckHtml=match?`<span class="ok">${isFr?"Document lié : hash confirmé":"Linked document: hash confirmed"} ✅</span>`:`<span class="bad">${R.docNoMatch} ❌</span><div class="muted" style="margin-top:6px;">${R.expected}: <b>${escapeHtml(expected)}</b><br>${R.got}: <b>${escapeHtml(got)}</b></div>`}
      let payloadHtml="";if(mode==="v1"){if(payloadMatch===true)payloadHtml=`<span class="ok">${isFr?"Intégrité de la preuve : OK":"Proof integrity: OK"} ✅</span>`;else if(payloadMatch===false)payloadHtml=`<span class="warn">${R.payloadDifferent} ⚠️</span>`}else{if(payloadMatch===true)payloadHtml=`<span class="ok">${R.payloadToSignOk} ✅</span>`;else if(payloadMatch===false)payloadHtml=`<span class="warn">${R.payloadToSignDifferent} ⚠️</span>`}
      const sigLabel=isFr?"Signature cryptographique":"Cryptographic signature";
      resultEl.innerHTML=tierHtml+`<div style="font-size:16px;font-weight:800;">${sigLabel} : <span class="${ok?"ok":"bad"}">${ok?(isFr?"valide":"valid")+" ✅":(isFr?"invalide":"invalid")+" ❌"}</span></div><div style="margin-top:8px;">${docCheckHtml}</div><div style="margin-top:8px;">${payloadHtml}</div>`+identityHtml+disclaimerHtml;
      resultEl.scrollIntoView({behavior:"smooth",block:"nearest"});
      if(mode==="v1"){const payload=doc.payload||{},issuer=payload.issuer||{},project=payload.project||{},ps=payload.process_summary||{},verification=payload.verification||{},activeSeconds=(ps.active_ms!=null)?Math.round(Number(ps.active_ms)/1000):"—";detailsEl.innerHTML=`<details class="technical-details"><summary>${isFr?"Détails techniques":"Technical details"}</summary><div class="muted" style="margin-top:10px;font-size:11px;">${R.digest}: <b>${escapeHtml(digestHex)}</b></div><div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;"><div style="flex:1;min-width:260px;"><div style="font-weight:950;margin-bottom:6px;">${D.summary}</div><div class="muted">${D.format}: <b>${escapeHtml(doc.format||"?")}</b></div><div class="muted">${D.version}: <b>${escapeHtml(doc.version||"?")}</b></div><div class="muted">${D.certId}: <b>${escapeHtml(payload.certificate_id||"?")}</b></div><div class="muted">${D.issuer}: <b>${escapeHtml(issuer.product||"?")}</b></div><div class="muted">${D.project}: <b>${escapeHtml(project.name||"?")}</b></div><div class="muted">${D.verdict}: <b>${escapeHtml(ps.verdict||"?")}</b></div></div><div style="flex:1;min-width:260px;"><div style="font-weight:950;margin-bottom:6px;">${D.processSummary}</div><div class="muted">active_seconds: <b>${escapeHtml(activeSeconds)}</b></div><div class="muted">scp_score: <b>${escapeHtml(ps.scp_score ?? "—")}</b></div><div class="muted">evidence_score: <b>${escapeHtml(ps.evidence_score ?? "—")}</b></div><div class="muted">valid_sessions: <b>${escapeHtml(ps.valid_sessions_count ?? "—")}</b></div><div class="muted">certified_sessions: <b>${escapeHtml(ps.certified_sessions_count ?? "—")}</b></div></div></div><div style="margin-top:14px;font-weight:950;">${D.pubkey}</div><pre>${escapeHtml(pubUsedB64)}</pre><div style="margin-top:14px;font-weight:950;">${D.expectedDoc}</div><pre>${escapeHtml(expectedDocSha||"—")}</pre><div style="margin-top:14px;font-weight:950;">${D.verificationMethod}</div><pre>${escapeHtml(verification.verification_method||"—")}</pre></details>`;return}
      const ho=doc.ho||{},subj=doc.subject||{},score=doc.score||{},m=(doc.evidence&&doc.evidence.sessions&&doc.evidence.sessions[0]&&doc.evidence.sessions[0].metrics)||{};
      detailsEl.innerHTML=`<details class="technical-details"><summary>${isFr?"Détails techniques":"Technical details"}</summary><div class="muted" style="margin-top:10px;font-size:11px;">${R.digest}: <b>${escapeHtml(digestHex)}</b></div><div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;"><div style="flex:1;min-width:260px;"><div style="font-weight:950;margin-bottom:6px;">${D.summary}</div><div class="muted">HO v: <b>${escapeHtml(ho.version||"?")}</b></div><div class="muted">${D.certId}: <b>${escapeHtml(ho.certificate_id||"?")}</b></div><div class="muted">App: <b>${escapeHtml((ho.app&&ho.app.name)||"?")}</b> ${(ho.app&&ho.app.version)?("v"+escapeHtml(ho.app.version)):""}</div><div class="muted">Titre: <b>${escapeHtml(subj.title||"?")}</b></div><div class="muted">${D.verdict}: <b>${escapeHtml(score.verdict||"?")}</b></div></div><div style="flex:1;min-width:260px;"><div style="font-weight:950;margin-bottom:6px;">${D.processSummary}</div><div class="muted">active_seconds: <b>${escapeHtml(m.active_seconds ?? "?")}</b></div><div class="muted">keystrokes: <b>${escapeHtml(m.keystrokes ?? "?")}</b></div><div class="muted">mouse_moves: <b>${escapeHtml(m.mouse_moves ?? "?")}</b></div><div class="muted">pastes: <b>${escapeHtml(m.pastes ?? "?")}</b></div></div></div><div style="margin-top:14px;font-weight:950;">${D.pubkey}</div><pre>${escapeHtml(pubUsedB64)}</pre><div style="margin-top:14px;font-weight:950;">${D.expectedDoc}</div><pre>${escapeHtml(expectedDocSha||"—")}</pre></details>`;
    }
    async function handleHoText(text){try{lastHo=await verifyHoJson(text);updateContextFromProofDoc(lastHo.doc);renderVerification()}catch(e){contextualProofState={found:"",verdict:"unknown"};renderContextualVerify();const resultEl=$("result"),detailsEl=$("details");if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div style="font-size:18px;font-weight:950;">${COPY[currentLang].error}: <span class="bad">${escapeHtml(e.message||String(e))}</span></div>`}if(detailsEl){detailsEl.style.display="none";detailsEl.innerHTML=""}}}
    async function handleDocFile(file){const digestBytes=await sha256BytesFromFile(file);lastDocHex=u8ToHex(digestBytes);renderVerification()}
    async function extractZipProof(ab){const view=new DataView(ab),bytes=new Uint8Array(ab),dec=new TextDecoder();let eocd=-1;for(let i=bytes.length-22;i>=0;i--){if(view.getUint32(i,true)===0x06054b50){eocd=i;break}}if(eocd<0)throw new Error("Kit ZIP invalide : structure introuvable.");const cdCount=view.getUint16(eocd+8,true),cdOff=view.getUint32(eocd+16,true);const entries=[];let pos=cdOff;for(let i=0;i<cdCount;i++){if(view.getUint32(pos,true)!==0x02014b50)break;const method=view.getUint16(pos+10,true),compSize=view.getUint32(pos+20,true),nameLen=view.getUint16(pos+28,true),extraLen=view.getUint16(pos+30,true),commentLen=view.getUint16(pos+32,true),localOff=view.getUint32(pos+42,true),name=dec.decode(bytes.subarray(pos+46,pos+46+nameLen));if(!name.endsWith("/"))entries.push({name,method,compSize,localOff});pos+=46+nameLen+extraLen+commentLen}async function readEntry(e){const lh=e.localOff;if(view.getUint32(lh,true)!==0x04034b50)throw new Error("Entrée ZIP invalide.");const nl=view.getUint16(lh+26,true),el=view.getUint16(lh+28,true),dataOff=lh+30+nl+el,comp=bytes.subarray(dataOff,dataOff+e.compSize);if(e.method===0)return comp;if(e.method!==8)throw new Error("Compression non supportée : "+e.name);if(typeof DecompressionStream==="undefined")throw new Error("Votre navigateur ne supporte pas la lecture ZIP. Importez le fichier de preuve séparément.");const ds=new DecompressionStream("deflate-raw"),w=ds.writable.getWriter();await w.write(comp);await w.close();return new Uint8Array(await new Response(ds.readable).arrayBuffer())}const proofEntry=entries.find(e=>e.name.split("/").pop()==="HumanOrigin_PROOF.v1.ho.json")||entries.find(e=>/\.ho\.json$/i.test(e.name))||entries.find(e=>/\.json$/i.test(e.name)&&/HumanOrigin/i.test(e.name));if(!proofEntry)throw new Error("Aucun fichier de preuve HumanOrigin trouvé dans ce kit.");const pdfs=entries.filter(e=>/\.pdf$/i.test(e.name)),pdfEntry=pdfs.find(e=>/HumanOrigin/i.test(e.name))||pdfs[0]||null;const proofBytes=await readEntry(proofEntry),proofText=dec.decode(proofBytes);let pdfBytes=null,pdfName=null;if(pdfEntry){pdfBytes=await readEntry(pdfEntry);pdfName=pdfEntry.name.split("/").pop()||pdfEntry.name}const warnings=[];if(!pdfEntry)warnings.push("Aucun PDF dans le kit — vérification de la preuve seule.");if(pdfs.length>1)warnings.push(pdfs.length+" PDF trouvés — premier document HumanOrigin utilisé.");return{proofText,pdfBytes,pdfName,warnings}}
    async function handleZipFile(file){const resultEl=$("result");if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div class="muted">${COPY[currentLang].loading}</div>`}try{const{proofText,pdfBytes,pdfName,warnings}=await extractZipProof(await file.arrayBuffer());await handleHoText(proofText);if(pdfBytes){await handleDocFile(new File([pdfBytes],pdfName||"document.pdf",{type:"application/pdf"}))}if(warnings.length&&resultEl){const w=document.createElement("div");w.className="muted";w.style.cssText="margin-top:10px;font-size:12px;";w.textContent=warnings.join(" ");resultEl.appendChild(w)}}catch(err){if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div style="font-size:18px;font-weight:950;">${COPY[currentLang].error} : <span class="bad">${escapeHtml(err?.message||String(err))}</span></div><div class="muted" style="margin-top:8px;">${escapeHtml(COPY[currentLang].unknownFile)}</div>`}}}
    async function handlePdfOnly(file){const digestBytes=await sha256BytesFromFile(file);lastDocHex=u8ToHex(digestBytes);if(lastHo){renderVerification()}else{const resultEl=$("result");if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div class="hint-box">${escapeHtml(COPY[currentLang].pdfHint)}</div>`}}}
    async function sniffHumanOriginFile(file){const name=String(file?.name||""),type=String(file?.type||"").toLowerCase();if(/\.zip$/i.test(name)||type==="application/zip"||type==="application/x-zip-compressed")return"zip";if(/\.pdf$/i.test(name)||type==="application/pdf")return"pdf";if(/\.ho\.json$/i.test(name)||/\.json$/i.test(name)||type==="application/json")return"json";const head=new Uint8Array(await file.slice(0,16).arrayBuffer());if(head.length>=2&&head[0]===0x50&&head[1]===0x4b)return"zip";if(head.length>=4&&head[0]===0x25&&head[1]===0x50&&head[2]===0x44&&head[3]===0x46)return"pdf";const sample=new TextDecoder().decode(head).trim();if(sample.startsWith("{")||sample.startsWith("["))return"json";return"unknown"}
    async function handleAnyFile(file){if(!file)return;const resultEl=$("result");if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div class="muted">${COPY[currentLang].receiving||COPY[currentLang].loading}</div>`}try{const kind=await sniffHumanOriginFile(file);if(kind==="zip"){await handleZipFile(file);return}if(kind==="json"){await handleHoText(await file.text());return}if(kind==="pdf"){await handlePdfOnly(file);return}const isFr=currentLang==="fr";const fmt=(n,t,s)=>{const sz=s>0?(s>1048576?(s/1048576).toFixed(1)+" MB":s>1024?(s/1024).toFixed(1)+" KB":s+" B"):"—";return`${escapeHtml(n||"—")} · ${escapeHtml(t||"—")} · ${sz}`};if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div style="font-size:15px;font-weight:800;color:rgba(232,238,252,.80);">${escapeHtml(COPY[currentLang].unknownFile)}</div><div class="muted" style="margin-top:8px;font-size:11px;">${isFr?"Fichier reçu":"Received file"} : ${fmt(file.name,file.type,file.size||0)}</div>`}}catch(err){if(resultEl){resultEl.style.display="block";resultEl.innerHTML=`<div style="font-size:18px;font-weight:950;">${COPY[currentLang].error} : <span class="bad">${escapeHtml(err?.message||String(err))}</span></div>`}}}

    function wireAll(){
      const dropMain=$("dropMain"),fileMain=$("fileMain");
      if(dropMain&&!dropMain.dataset.wired){dropMain.dataset.wired="1";dropMain.addEventListener("dragover",e=>{e.preventDefault();dropMain.classList.add("hover")});dropMain.addEventListener("dragleave",()=>{dropMain.classList.remove("hover")});dropMain.addEventListener("drop",async e=>{e.preventDefault();dropMain.classList.remove("hover");const f=e.dataTransfer.files?.[0];if(f)handleAnyFile(f)})}
      if(fileMain&&!fileMain.dataset.wired){fileMain.dataset.wired="1";fileMain.addEventListener("change",async e=>{const f=e.target.files?.[0];if(f){handleAnyFile(f);e.target.value=""}})}
      const dropHo=$("dropHo"),fileHo=$("fileHo");
      if(dropHo&&!dropHo.dataset.wired){dropHo.dataset.wired="1";dropHo.addEventListener("dragover",e=>{e.preventDefault();dropHo.style.opacity="0.85"});dropHo.addEventListener("dragleave",()=>{dropHo.style.opacity="1"});dropHo.addEventListener("drop",async e=>{e.preventDefault();dropHo.style.opacity="1";const f=e.dataTransfer.files?.[0];if(!f)return;handleHoText(await f.text())})}
      if(fileHo&&!fileHo.dataset.wired){fileHo.dataset.wired="1";fileHo.addEventListener("change",async e=>{const f=e.target.files?.[0];if(!f)return;handleHoText(await f.text())})}
      const dropDoc=$("dropDoc"),fileDoc=$("fileDoc");
      if(dropDoc&&!dropDoc.dataset.wired){dropDoc.dataset.wired="1";dropDoc.addEventListener("dragover",e=>{e.preventDefault();dropDoc.style.opacity="0.85"});dropDoc.addEventListener("dragleave",()=>{dropDoc.style.opacity="1"});dropDoc.addEventListener("drop",async e=>{e.preventDefault();dropDoc.style.opacity="1";const f=e.dataTransfer.files?.[0];if(!f)return;handleDocFile(f)})}
      if(fileDoc&&!fileDoc.dataset.wired){fileDoc.dataset.wired="1";fileDoc.addEventListener("change",async e=>{const f=e.target.files?.[0];if(!f)return;handleDocFile(f)})}
    }
    function setLanguage(lang){
      currentLang=(lang==="fr")?"fr":"en";
      document.documentElement.lang=currentLang;
      $("langEnBtn").classList.toggle("active",currentLang==="en");
      $("langFrBtn").classList.toggle("active",currentLang==="fr");
      const C=COPY[currentLang];
      const set=(id,v)=>{const el=$(id);if(el)el.textContent=v};
      set("mainTitle",C.title);set("mainIntro",C.intro);set("dropMainTitle",C.dropTitle);set("dropMainSub",C.dropSub);set("fileMainLabel",C.fileBtn);set("advancedSummary",C.advanced);set("proofOnlyLabel",C.proofOnly);set("fileHoLabel",C.proofBtn);set("docOnlyLabel",C.docOnly);set("fileDocLabel",C.docBtn);set("pubKeyLabel",C.pubKeyLabel);set("footerText",C.footer);
      const pk=$("overridePubKey");if(pk)pk.placeholder=C.pubKeyPlaceholder;
      renderContextualVerify();
      wireAll();
    }
    $("langEnBtn").addEventListener("click",()=>setLanguage("en"));
    $("langFrBtn").addEventListener("click",()=>setLanguage("fr"));
    setLanguage(currentLang);
  </script>
