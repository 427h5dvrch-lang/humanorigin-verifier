<head>
  <meta charset="utf-8" />

  <title>HumanOrigin Verifier</title>
  <style>
    :root{
      --bg:#051222;--bg2:#0b1d38;--surface:#f7f8fa;--line:rgba(15,23,42,.08);
      --ink:#0f172a;--muted:#475569;--muted2:#64748b;--dark-card:rgba(255,255,255,.05);
      --dark-line:rgba(255,255,255,.09);--ok:#16a34a;--warn:#d97706;--bad:#dc2626;
      --shadow-lg:0 16px 40px rgba(15,23,42,.10);--shadow-md:0 10px 24px rgba(15,23,42,.06);
    }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 500px at 50% -10%, rgba(25,84,190,.24), transparent 55%),
        radial-gradient(900px 600px at 0% 0%, rgba(20,72,160,.16), transparent 55%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 44%, #04101d 100%);
      color:#e8eefc;min-height:100vh
    }
    .page{max-width:1140px;margin:0 auto;padding:26px 24px 56px}
    .langbar{display:flex;justify-content:flex-end;gap:8px;margin:0 0 18px}
    .langbtn{display:inline-flex;align-items:center;justify-content:center;min-width:54px;min-height:36px;padding:0 14px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#e8eefc;font-weight:800;cursor:pointer}
    .langbtn.active{background:#fff;color:var(--ink);border-color:#fff}
    .rail{margin:0 0 18px}
    .rail-shell{display:grid;grid-template-columns:1fr 1fr 1.08fr;background:rgba(255,255,255,.982);border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 18px 42px rgba(15,23,42,.12)}
    .rail-item{padding:18px 18px 17px;border-right:1px solid var(--line)}
    .rail-item:last-child{border-right:none}
    .rail-kicker{margin:0 0 6px;font-size:10px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:800}
    .rail-title{margin:0;font-size:clamp(20px,2vw,28px);line-height:1.02;letter-spacing:-.04em;color:var(--ink);font-weight:880}
    .rail-copy{margin:6px 0 0;max-width:32ch;color:var(--muted);font-size:13px;line-height:1.45}
    .hero{background:linear-gradient(180deg, rgba(255,255,255,.988) 0%, rgba(248,250,252,.97) 100%);border:1px solid var(--line);border-radius:30px;box-shadow:0 18px 44px rgba(15,23,42,.12);padding:26px 24px 22px;margin:0 0 18px;color:var(--ink);position:relative;overflow:hidden}
    .hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:10px}
    .hero-kicker{margin:0 0 8px;font-size:11px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:800}
    .hero-title{margin:0;font-size:clamp(38px,5vw,58px);line-height:.98;letter-spacing:-.06em;color:var(--ink);font-weight:900}
    .hero-side{flex:0 0 auto;display:flex;align-items:center;min-height:38px;padding:0 14px;border-radius:999px;background:#0f172a;color:#fff;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;white-space:nowrap}
    .hero-intro{margin:0 0 18px;max-width:900px;color:var(--muted);font-size:15px;line-height:1.62}
    .hero-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:0 0 14px}
    .chip{display:flex;align-items:center;min-height:46px;padding:0 14px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.84);color:var(--ink);font-size:13px;line-height:1.2;font-weight:760;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-shadow:0 6px 16px rgba(15,23,42,.03)}
    .chip.strong{background:#0f172a;color:#fff;border-color:#0f172a;box-shadow:none}
    .chip.primary{background:#fff;border-color:rgba(15,23,42,.10)}
    .trust-chain{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-bottom:14px}
    .trust-card{border:1px solid var(--line);background:rgba(255,255,255,.76);border-radius:18px;padding:16px 16px 14px}
    .trust-kicker{margin:0 0 8px;font-size:11px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:800}
    .trust-copy{margin:0;color:#334155;font-size:14px;line-height:1.62}
    .tool-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
    .tool-pill{display:inline-flex;align-items:center;min-height:32px;padding:0 11px;border-radius:999px;border:1px solid rgba(15,23,42,.06);background:rgba(255,255,255,.48);color:var(--muted2);font-size:11.5px;font-weight:640;text-decoration:none;opacity:.80}
    .statement{border:1px solid var(--line);background:rgba(255,255,255,.74);border-radius:18px;padding:16px 16px 14px}
    .statement-kicker{margin:0 0 8px;font-size:11px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:var(--muted2);font-weight:800}
    .statement-copy{margin:0;font-size:14px;line-height:1.65;color:#334155}
    .section{background:linear-gradient(180deg, rgba(255,255,255,.065) 0%, rgba(255,255,255,.045) 100%);border:1px solid rgba(255,255,255,.11);border-radius:24px;padding:22px 20px;margin:0 0 18px;box-shadow:0 14px 32px rgba(0,0,0,.16)}
    .section.subdued{opacity:.82;filter:saturate(.92)}
    .section-kicker{margin:0 0 8px;font-size:12px;line-height:1.1;letter-spacing:.12em;text-transform:uppercase;color:rgba(232,238,252,.45);font-weight:800}
    .section-title{margin:0 0 8px;font-size:30px;line-height:1.08;letter-spacing:-.03em;color:#edf3ff;font-weight:860}
    .section-intro{margin:0;color:rgba(232,238,252,.74);line-height:1.65;max-width:880px}
    .card-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:18px}
    .subcard{background:rgba(255,255,255,.90);border:1px solid rgba(15,23,42,.08);border-radius:18px;padding:18px;box-shadow:0 10px 22px rgba(15,23,42,.04);color:var(--ink)}
    .subcard h3{margin:0 0 10px;font-size:18px;line-height:1.25;color:var(--ink)}
    .subcard p{margin:0 0 10px;color:var(--muted);line-height:1.58}
    .subcard p:last-child{margin-bottom:0}
    .workspace-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
    .workspace-card{border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.04);border-radius:20px;padding:18px}
    .workspace-label{margin:0 0 8px;font-size:11px;line-height:1.1;letter-spacing:.16em;text-transform:uppercase;color:rgba(232,238,252,.46);font-weight:800}
    .workspace-title{margin:0 0 8px;font-size:20px;line-height:1.15;color:#f4f8ff;font-weight:850}
    .workspace-copy{margin:0 0 14px;color:rgba(232,238,252,.74);line-height:1.62}
    .drop{border:2px dashed rgba(255,255,255,.16);border-radius:18px;padding:20px;text-align:center;color:#e8eefc;background:rgba(0,0,0,.10);min-height:160px;display:flex;flex-direction:column;justify-content:center}
    .drop-title{font-size:17px;font-weight:900;margin-bottom:8px}
    .file-trigger{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 14px;border-radius:12px;border:1px solid rgba(255,255,255,.16);color:#e8eefc;text-decoration:none;font-weight:800;background:rgba(255,255,255,.06);cursor:pointer;margin-top:12px;align-self:center}
    input[type="file"]{display:none}
    input[type="text"]{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.22);color:#e8eefc;border-radius:12px;margin-top:8px}
    .result-box{margin-top:18px;padding:16px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10)}
    .details-box{margin-top:14px}
    .muted{color:rgba(232,238,252,.72)} .ok{color:var(--ok);font-weight:900} .bad{color:var(--bad);font-weight:900} .warn{color:var(--warn);font-weight:900}
    pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.24);padding:12px;border-radius:12px;color:#e8eefc}
    @media (max-width:980px){.rail-shell,.card-grid,.workspace-grid,.trust-chain,.hero-meta{grid-template-columns:1fr}.rail-item{border-right:none;border-bottom:1px solid var(--line)} .rail-item:last-child{border-bottom:none}}
    @media (max-width:760px){.page{padding:18px 16px 42px}.hero,.section{padding:18px 16px}.hero-title{font-size:32px}.hero-side{white-space:normal;min-height:auto;padding:10px 12px;border-radius:14px}.hero-top{flex-direction:column;align-items:flex-start}.chip{white-space:normal;height:auto;padding:12px 14px;border-radius:16px}}
  
  .ho-context-wrap{
    max-width:1100px;
    margin:0 auto 18px;
    padding:0;
  }
  .ho-context-card{
    background:linear-gradient(180deg, rgba(255,255,255,.988) 0%, rgba(248,250,252,.97) 100%);
    border:1px solid var(--line);
    border-radius:22px;
    padding:14px 16px 13px;
    box-shadow:0 12px 28px rgba(15,23,42,.10);
    color:var(--ink);
  }
  .ho-context-kicker{
    margin:0 0 6px;
    font-size:10px;
    line-height:1.1;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted2);
    font-weight:800;
  }
  .ho-context-title{
    margin:0 0 6px;
    font-size:22px;
    line-height:1.02;
    letter-spacing:-.04em;
    color:var(--ink);
    font-weight:880;
  }
  .ho-context-copy{
    margin:0;
    max-width:920px;
    color:var(--muted);
    font-size:13px;
    line-height:1.52;
  }
  .ho-context-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
    margin-top:10px;
  }
  .ho-context-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:36px;
    padding:0 12px;
    border-radius:12px;
    text-decoration:none;
    font-weight:800;
    font-size:13px;
    border:1px solid rgba(15,23,42,.10);
    background:#fff;
    color:var(--ink);
  }
  .ho-pill{
    display:inline-flex;
    align-items:center;
    min-height:36px;
    padding:0 12px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:760;
    background:rgba(15,23,42,.05);
    border:1px solid rgba(15,23,42,.08);
    color:var(--ink);
  }
  .ho-pill.ok{ background:#eaf6ea; border-color:rgba(22,163,74,.16); color:#166534; }
  .ho-pill.warn{ background:#fff5df; border-color:rgba(217,119,6,.16); color:#92400e; }
  .ho-pill.bad{ background:#fde9e9; border-color:rgba(220,38,38,.16); color:#991b1b; }
  .ho-context-foot{
    margin-top:8px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:11.5px;
    line-height:1.45;
    color:#5d6a7a;
    word-break:break-word;
  }

  </style>
<style id="HO_EXPLAIN_SECTIONS_CONTRAST_V1">
  /*
    Rend lisibles les sections basses :
    - "Ce que ce registre signifie"
    - "Comment lire ce record"
    sans modifier la logique du verifier.
  */

  body.ho-context-mode .ho-explain-section{
    background:rgba(255,255,255,.94) !important;
    border:1px solid rgba(15,23,42,.10) !important;
    border-radius:26px !important;
    box-shadow:0 22px 60px rgba(15,23,42,.13) !important;
    color:#0f172a !important;
  }

  body.ho-context-mode .ho-explain-section *{
    opacity:1 !important;
    filter:none !important;
    text-shadow:none !important;
  }

  body.ho-context-mode .ho-explain-section h1,
  body.ho-context-mode .ho-explain-section h2,
  body.ho-context-mode .ho-explain-section h3{
    color:#0f172a !important;
    opacity:1 !important;
    font-weight:950 !important;
  }

  body.ho-context-mode .ho-explain-section p,
  body.ho-context-mode .ho-explain-section .muted,
  body.ho-context-mode .ho-explain-section [class*="intro"],
  body.ho-context-mode .ho-explain-section [class*="copy"]{
    color:#334155 !important;
    opacity:1 !important;
    font-weight:650 !important;
    line-height:1.55 !important;
  }

  body.ho-context-mode .ho-explain-section .kicker,
  body.ho-context-mode .ho-explain-section [class*="kicker"],
  body.ho-context-mode .ho-explain-section .label,
  body.ho-context-mode .ho-explain-section [class*="label"]{
    color:#64748b !important;
    opacity:1 !important;
    font-weight:950 !important;
    letter-spacing:.15em !important;
    text-transform:uppercase !important;
  }

  body.ho-context-mode .ho-explain-section .card,
  body.ho-context-mode .ho-explain-section .panel,
  body.ho-context-mode .ho-explain-section [class*="card"],
  body.ho-context-mode .ho-explain-section [class*="panel"]{
    background:#f8fafc !important;
    border:1px solid rgba(15,23,42,.09) !important;
    color:#0f172a !important;
    box-shadow:none !important;
  }

  body.ho-context-mode .ho-explain-section .card h1,
  body.ho-context-mode .ho-explain-section .card h2,
  body.ho-context-mode .ho-explain-section .card h3,
  body.ho-context-mode .ho-explain-section .panel h1,
  body.ho-context-mode .ho-explain-section .panel h2,
  body.ho-context-mode .ho-explain-section .panel h3,
  body.ho-context-mode .ho-explain-section [class*="card"] h1,
  body.ho-context-mode .ho-explain-section [class*="card"] h2,
  body.ho-context-mode .ho-explain-section [class*="card"] h3{
    color:#0f172a !important;
  }

  body.ho-context-mode .ho-explain-section .card p,
  body.ho-context-mode .ho-explain-section .panel p,
  body.ho-context-mode .ho-explain-section [class*="card"] p,
  body.ho-context-mode .ho-explain-section [class*="panel"] p{
    color:#334155 !important;
  }

  /*
    Le bandeau "Cette page / Source de vérité / Objet lié" est utile :
    on le garde, mais on l'affine légèrement.
  */
  body.ho-context-mode .ho-trust-rail{
    background:rgba(255,255,255,.96) !important;
    border:1px solid rgba(15,23,42,.10) !important;
    box-shadow:0 16px 45px rgba(15,23,42,.10) !important;
  }

  body.ho-context-mode .ho-trust-rail *{
    opacity:1 !important;
    filter:none !important;
  }

  body.ho-context-mode .ho-trust-rail h1,
  body.ho-context-mode .ho-trust-rail h2,
  body.ho-context-mode .ho-trust-rail h3,
  body.ho-context-mode .ho-trust-rail strong{
    color:#0f172a !important;
  }

  body.ho-context-mode .ho-trust-rail p,
  body.ho-context-mode .ho-trust-rail div,
  body.ho-context-mode .ho-trust-rail span{
    color:#334155 !important;
  }
</style>

re>`;return}
      const ho=doc.ho||{},subj=doc.subject||{},score=doc.score||{},m=(doc.evidence&&doc.evidence.sessions&&doc.evidence.sessions[0]&&doc.evidence.sessions[0].metrics)||{};

<script id="HO_EXPLAIN_SECTIONS_CONTRAST_JS_V1">
(function(){
  function hasContext(){
    try{
      var p = new URLSearchParams(window.location.search || "");
      return !!(p.get("project") || p.get("expected_document") || p.get("expected_file") || p.get("expected_proof"));
    }catch(e){
      return false;
    }
  }

  function textOf(el){
    return (el && el.textContent || "").replace(/\s+/g, " ").trim();
  }

  function markNearestLargeBlock(el, cls){
    var node = el;
    var best = null;

    for(var i=0;i<10 && node && node.parentElement && node.parentElement !== document.body;i++){
      var t = textOf(node);
      var childCount = node.children ? node.children.length : 0;

      if(
        node.tagName === "SECTION" ||
        childCount >= 2 ||
        /section|meaning|guide|card|panel|block|wrap/i.test(String(node.className || ""))
      ){
        best = node;
      }

      node = node.parentElement;
    }

    if(best) best.classList.add(cls);
  }

  function run(){
    if(!hasContext()) return;
    document.body.classList.add("ho-context-mode");

    Array.from(document.querySelectorAll("h1,h2,h3,div")).forEach(function(el){
      var t = textOf(el);

      if(
        t === "Ce que ce registre signifie" ||
        t === "What this registry means" ||
        t === "What this record means" ||
        t === "Comment lire ce record" ||
        t === "How to read this record" ||
        t === "How to read this registry"
      ){
        markNearestLargeBlock(el, "ho-explain-section");
      }

      if(
        t.indexOf("Registre public") >= 0 &&
        t.indexOf("Preuve signée") >= 0 &&
        t.indexOf("Document lié par SHA-256") >= 0
      ){
        markNearestLargeBlock(el, "ho-trust-rail");
      }
    });
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", run);
  }else{
    run();
  }

  [80,200,500,1000,1800].forEach(function(ms){ setTimeout(run, ms); });

  try{
    var mo = new MutationObserver(run);
    mo.observe(document.documentElement, {childList:true, subtree:true, characterData:true});
  }catch(e){}
})();
</script>

<style id="HO_FINAL_SAFE_VERIFIER_UI_V1">
/* HumanOrigin — final safe verifier UI.
   Ne change pas la DA des boutons/cartes.
   Objectifs uniques :
   1) masquer le panneau générique "Statut de la preuve"
   2) mettre les deux cartes Importer la preuve / Importer le document lié côte à côte sur desktop. */

.ho-force-hide-status-panel {
  display: none !important;
}

@media (min-width: 900px) {
  .ho-upload-two-columns {
    display: grid !important;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
    gap: 22px !important;
    align-items: stretch !important;
  }

  .ho-upload-two-columns > * {
    min-width: 0 !important;
  }
}

@media (max-width: 899px) {
  .ho-upload-two-columns {
    display: block !important;
  }
}
</style>

<script id="HO_FINAL_SAFE_VERIFIER_UI_V1">
(function () {
  function norm(s) {
    return String(s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/\s+/g, " ")
      .trim();
  }

  function hideStatusPanel() {
    var headings = Array.from(document.querySelectorAll("h1, h2, h3, [role='heading']"));

    var title = headings.find(function (el) {
      var t = norm(el.textContent);
      return t === "statut de la preuve" || t === "proof status";
    });

    if (!title) return;

    var current = title.parentElement;
    var best = null;

    for (var i = 0; i < 10 && current && current !== document.body; i++) {
      var t = norm(current.textContent);

      var containsStatus =
        t.indexOf("statut de la preuve") !== -1 ||
        t.indexOf("proof status") !== -1;

      var containsEmptyStatus =
        t.indexOf("chaine de confiance") !== -1 ||
        t.indexOf("chain of trust") !== -1 ||
        t.indexOf("note de statut") !== -1 ||
        t.indexOf("status note") !== -1 ||
        t.indexOf("aucun record") !== -1 ||
        t.indexOf("no record") !== -1 ||
        t.indexOf("mode : vue generique") !== -1 ||
        t.indexOf("generic view") !== -1;

      var containsVerifier =
        t.indexOf("verifier une preuve") !== -1 ||
        t.indexOf("verify a proof") !== -1 ||
        t.indexOf("importer la preuve") !== -1 ||
        t.indexOf("import proof") !== -1;

      if (containsStatus && containsEmptyStatus && !containsVerifier) {
        best = current;
      }

      current = current.parentElement;
    }

    if (best) {
      best.classList.add("ho-force-hide-status-panel");
      best.setAttribute("data-ho-hidden", "generic-proof-status");
    }
  }

  function makeUploadCardsTwoColumns() {
    var headings = Array.from(document.querySelectorAll("h1, h2, h3, h4, strong, b, div, p"));

    var proofTitle = headings.find(function (el) {
      var t = norm(el.textContent);
      return t === "importer la preuve" || t === "import proof";
    });

    var docTitle = headings.find(function (el) {
      var t = norm(el.textContent);
      return t === "importer le document lie" || t === "import linked document" || t === "import document";
    });

    if (!proofTitle || !docTitle) return;

    function findCard(el) {
      var current = el;
      for (var i = 0; i < 8 && current && current !== document.body; i++) {
        var tx = norm(current.textContent);
        var box = current.getBoundingClientRect ? current.getBoundingClientRect() : { width: 0, height: 0 };

        var isProofCard =
          tx.indexOf("entree preuve") !== -1 ||
          tx.indexOf("proof input") !== -1;

        var isDocCard =
          tx.indexOf("entree document") !== -1 ||
          tx.indexOf("document input") !== -1;

        var hasOnlyOneMainCard =
          (isProofCard && tx.indexOf("entree document") === -1) ||
          (isDocCard && tx.indexOf("entree preuve") === -1);

        if (hasOnlyOneMainCard && box.width > 220 && box.height > 120) {
          return current;
        }

        current = current.parentElement;
      }
      return null;
    }

    var proofCard = findCard(proofTitle);
    var docCard = findCard(docTitle);

    if (!proofCard || !docCard || proofCard === docCard) return;

    var parent = proofCard.parentElement;
    if (!parent || docCard.parentElement !== parent) return;

    parent.classList.add("ho-upload-two-columns");
    parent.setAttribute("data-ho-layout", "upload-two-columns");
  }

  function apply() {
    hideStatusPanel();
    makeUploadCardsTwoColumns();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", apply);
  } else {
    apply();
  }

  setTimeout(apply, 150);
  setTimeout(apply, 500);
  setTimeout(apply, 1000);

  new MutationObserver(apply).observe(document.documentElement, {
    childList: true,
    subtree: true
  });
})();
</script>
